{% extends "base.html" %}

{% block title %}Registrarse - Sistema de Monitoreo{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow-lg">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="fa-solid fa-user-plus fa-3x" style="color: #818cf8;"></i>
                    <h2 class="mt-3">Crear Cuenta</h2>
                    <p style="color: #cbd5e1;">Únete al sistema de monitoreo</p>
                </div>

                {% if error %}
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="fa-solid fa-exclamation-circle"></i> {{ error }}
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
                    </div>
                {% endif %}

                <form method="POST" action="/registro">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="nombre" class="form-label">
                                <i class="fa-solid fa-id-card"></i> Nombre Completo
                            </label>
                            <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Tu nombre" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="username" class="form-label">
                                <i class="fa-solid fa-user"></i> Usuario
                            </label>
                            <input type="text" class="form-control" id="username" name="username" placeholder="Tu usuario" minlength="3" required>
                            <small style="color: #cbd5e1; display: block; margin-top: 0.3rem;">Mínimo 3 caracteres</small>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="correo" class="form-label">
                            <i class="fa-solid fa-envelope"></i> Correo Electrónico
                        </label>
                        <input type="email" class="form-control" id="correo" name="correo" placeholder="tu@email.com" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="contraseña" class="form-label">
                                <i class="fa-solid fa-lock"></i> Contraseña
                            </label>
                            <input type="password" class="form-control" id="contraseña" name="contraseña" placeholder="••••••" minlength="6" required>
                            <small style="color: #cbd5e1; display: block; margin-top: 0.3rem;">Mínimo 6 caracteres</small>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="contraseña_confirm" class="form-label">
                                <i class="fa-solid fa-lock"></i> Confirmar Contraseña
                            </label>
                            <input type="password" class="form-control" id="contraseña_confirm" name="contraseña_confirm" placeholder="••••••" minlength="6" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="terminos" required>
                            <label class="form-check-label" for="terminos">
                                Acepto los <a href="#" style="color: #818cf8; font-weight: 600;">términos y condiciones</a>
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2">
                        <i class="fa-solid fa-user-plus"></i> Crear Cuenta
                    </button>
                </form>

                <hr style="border-color: #334155; margin: 2rem 0;">

                <p class="text-center" style="color: #cbd5e1;">
                    ¿Ya tienes cuenta?
                    <a href="/login" style="color: #818cf8; text-decoration: none; font-weight: 700;">
                        <strong>Ingresar aquí</strong>
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
