version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: monitoreo_sistemas
      MYSQL_USER: monitoreo
      MYSQL_PASSWORD: monitoreo_pass
    volumes:
      - db_data:/var/lib/mysql
      - ./database_setup.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./db_init_admin.sql:/docker-entrypoint-initdb.d/02_admin.sql:ro
      - ./db_init_devices.sql:/docker-entrypoint-initdb.d/03_devices.sql:ro
    ports:
      - "3307:3306"
    networks:
      monitoreo_net:
        ipv4_address: 172.28.0.2

  web:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_USER: monitoreo
      DB_PASSWORD: monitoreo_pass
      DB_NAME: monitoreo_sistemas
      MAIL_USERNAME: infomonitoreo01@gmail.com
      MAIL_PASSWORD: Kiara25.
      MAIL_SERVER: smtp.gmail.com
      MAIL_PORT: "587"
      MAIL_USE_TLS: "True"
      MAIL_USE_SSL: "False"
      TELEGRAM_BOT_TOKEN: "8645532198:AAFxDCrewAsWgOr-Z5zQApJaVHXsilUgwrQ"
      TELEGRAM_CHAT_ID: "1334190620"
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    command: ["python", "wait_for_db.py"]
    networks:
      monitoreo_net:
        ipv4_address: 172.28.0.3

  # ==================== MÁQUINAS VIRTUALES UBUNTU ====================

  ubuntu-vm-01:
    build:
      context: .
      dockerfile: Dockerfile.agent
    restart: unless-stopped
    depends_on:
      - web
    environment:
      MONITOR_SERVER_URL: http://web:5000/metricas
      AGENT_INTERVAL: "60"
    hostname: ubuntu-vm-01
    networks:
      monitoreo_net:
        ipv4_address: 172.28.0.10

  ubuntu-vm-02:
    build:
      context: .
      dockerfile: Dockerfile.agent
    restart: unless-stopped
    depends_on:
      - web
    environment:
      MONITOR_SERVER_URL: http://web:5000/metricas
      AGENT_INTERVAL: "60"
    hostname: ubuntu-vm-02
    networks:
      monitoreo_net:
        ipv4_address: 172.28.0.11

  ubuntu-vm-03:
    build:
      context: .
      dockerfile: Dockerfile.agent
    restart: unless-stopped
    depends_on:
      - web
    environment:
      MONITOR_SERVER_URL: http://web:5000/metricas
      AGENT_INTERVAL: "60"
    hostname: ubuntu-vm-03
    networks:
      monitoreo_net:
        ipv4_address: 172.28.0.12

volumes:
  db_data:

networks:
  monitoreo_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
